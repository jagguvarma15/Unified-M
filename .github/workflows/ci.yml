name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend-checks:
    name: Backend Format + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Unit tests
        run: uv run pytest tests/test_transforms.py tests/test_optimization.py -q

      - name: Docs sync check
        run: uv run python scripts/check_docs_sync.py

  frontend-checks:
    name: Frontend Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        working-directory: ui
        run: bun install --frozen-lockfile

      - name: Prettier format check
        working-directory: ui
        run: bunx prettier --check "src/**/*.{ts,tsx,css}" "index.html"

  link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,429 README.md docs/**/*.md
          fail: true
